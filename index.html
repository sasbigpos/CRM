<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-zinc-950">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
            <div class="flex justify-center mb-6">
                <div class="w-14 h-14 bg-yellow-500 rounded-3xl flex items-center justify-center text-5xl logo-font text-black">Q</div>
            </div>
            <h2 class="text-3xl font-bold text-center mb-8">QuickCRM</h2>
            <input id="login-email" type="email" value="allan.koay@bigpos.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4">
            <input id="login-password" type="password" value="demo1234" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
            <button onclick="login()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-semibold rounded-3xl">Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-yellow-500 rounded-2xl flex items-center justify-center text-2xl logo-font text-black">Q</div>
                    <span class="text-3xl font-semibold tracking-tighter logo-font">QuickCRM</span>
                </div>
                <div id="user-info" class="mt-6"></div>
            </div>
            <div class="flex-1 py-8 px-3" id="sidebar-nav"></div>
            <div class="p-4 border-t border-zinc-800">
                <button onclick="logout()" class="w-full py-3 text-red-400 hover:bg-zinc-800 rounded-3xl">Logout</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
                <input id="search-input" type="text" placeholder="Search..." class="w-80 bg-zinc-800 border border-zinc-700 rounded-3xl py-3 px-5 pl-12 focus:border-yellow-500">
                <button onclick="showAddCustomerModal()" class="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold px-6 py-2.5 rounded-3xl">
                    <i class="fa-solid fa-plus"></i> New Customer
                </button>
            </header>

            <div id="dashboard-view" class="flex-1 p-8 overflow-auto"></div>
            <div id="customers-view" class="flex-1 p-8 overflow-auto hidden"></div>
            <div id="products-view" class="flex-1 p-8 overflow-auto hidden"></div>
            <div id="invoices-view" class="flex-1 p-8 overflow-auto hidden"></div>
            <div id="reports-view" class="flex-1 p-8 overflow-auto hidden"></div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 w-full max-w-md mx-4 rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <div id="qr-company" class="text-2xl font-semibold"></div>
                <button onclick="hideQRModal()" class="text-3xl text-zinc-500">×</button>
            </div>
            <div id="qr-address" class="text-zinc-400 mb-8"></div>
            <div class="flex justify-center bg-white p-6 rounded-3xl">
                <div id="qr-code-container"></div>
            </div>
        </div>
    </div>

    <!-- Customer Modal -->
    <div id="customer-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 w-full max-w-2xl mx-4 rounded-3xl overflow-hidden">
            <div class="px-8 py-6 border-b border-zinc-800 flex justify-between">
                <h3 id="modal-title" class="text-2xl font-semibold">New Customer</h3>
                <button onclick="hideCustomerModal()" class="text-3xl text-zinc-500">×</button>
            </div>
            <div class="p-8 space-y-6 max-h-[75vh] overflow-auto" id="customer-form"></div>
            <div class="p-8 border-t border-zinc-800 flex gap-4">
                <button onclick="hideCustomerModal()" class="flex-1 py-4 border border-zinc-700 rounded-3xl">Cancel</button>
                <button onclick="saveCustomer()" class="flex-1 py-4 bg-yellow-500 text-black font-semibold rounded-3xl">Save Customer</button>
            </div>
        </div>
    </div>

    <!-- Invoice Modal -->
    <div id="invoice-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-800 flex justify-between">
                <h3 class="text-2xl font-semibold">Create Invoice</h3>
                <button onclick="hideInvoiceModal()" class="text-3xl text-zinc-500">×</button>
            </div>
            <div class="flex-1 p-8 overflow-auto" id="invoice-form">
                <!-- Dynamic Content -->
            </div>
            <div class="p-6 border-t border-zinc-800 flex gap-4">
                <button onclick="hideInvoiceModal()" class="flex-1 py-4 border border-zinc-700 rounded-3xl">Cancel</button>
                <button onclick="generateInvoicePreview()" class="flex-1 py-4 bg-yellow-500 text-black font-semibold rounded-3xl">Generate & Print Invoice</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBJvYS9uxLlk2fHatjU1YGzuU0fuCHzBQ",
            authDomain: "mbcrm-4bff9.firebaseapp.com",
            projectId: "mbcrm-4bff9",
            storageBucket: "mbcrm-4bff9.firebasestorage.app",
            messagingSenderId: "444950756057",
            appId: "1:444950756057:web:fdda66d8f5505dd1119cc8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCustomers = [];
        let allProducts = [];
        let invoiceItems = [];

        function login() {
            initApp();
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info').innerHTML = `<div class="font-medium">allan.koay@bigpos.com</div><div class="text-xs text-yellow-400">SUPERADMIN</div>`;
            renderSidebar();
            navigateTo('dashboard');
            loadCustomers();
            loadProducts();
        }

        function renderSidebar() {
            document.getElementById('sidebar-nav').innerHTML = `
                <a onclick="navigateTo('dashboard')" class="block px-4 py-3 rounded-3xl hover:bg-zinc-800 mb-1">📊 Dashboard</a>
                <a onclick="navigateTo('customers')" class="block px-4 py-3 rounded-3xl hover:bg-zinc-800 mb-1">👥 Customers</a>
                <a onclick="navigateTo('products')" class="block px-4 py-3 rounded-3xl hover:bg-zinc-800 mb-1">📦 Products</a>
                <a onclick="navigateTo('invoices')" class="block px-4 py-3 rounded-3xl hover:bg-zinc-800 mb-1">📄 Invoices</a>
                <a onclick="navigateTo('reports')" class="block px-4 py-3 rounded-3xl hover:bg-zinc-800 mb-1">📈 Reports</a>
            `;
        }

        function navigateTo(view) {
            document.querySelectorAll('#dashboard-view, #customers-view, #products-view, #invoices-view, #reports-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(view + '-view').classList.remove('hidden');
            if (view === 'dashboard') renderDashboard();
            if (view === 'customers') renderCustomersTable();
            if (view === 'products') renderProducts();
            if (view === 'invoices') renderInvoices();
            if (view === 'reports') renderReports();
        }

        // Load Data
        async function loadCustomers() {
            const snap = await db.collection('customers').orderBy('createdAt', 'desc').get();
            allCustomers = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderDashboard();
            renderCustomersTable();
        }

        async function loadProducts() {
            const snap = await db.collection('products').get();
            allProducts = snap.docs.map(d => ({id: d.id, ...d.data()}));
        }

        function renderDashboard() {
            document.getElementById('dashboard-view').innerHTML = `
                <h1 class="text-4xl font-bold">Good morning 👋</h1>
                <div class="mt-10 text-8xl font-bold text-yellow-400">${allCustomers.length}</div>
                <p class="text-xl text-zinc-400">Total Customers</p>
            `;
        }

        function renderCustomersTable() {
            let html = `<h1 class="text-3xl font-semibold mb-6">All Customers</h1>`;
            html += `<div class="bg-zinc-900 rounded-3xl overflow-hidden">`;
            html += `<table class="w-full"><thead><tr class="border-b border-zinc-800">
                <th class="text-left px-8 py-5">Company</th>
                <th class="text-left px-8 py-5">Address</th>
                <th class="w-32"></th></tr></thead><tbody>`;

            allCustomers.forEach(c => {
                html += `<tr class="border-b hover:bg-zinc-800">
                    <td class="px-8 py-6 font-medium">${c.company}</td>
                    <td class="px-8 py-6 text-sm text-zinc-400">${(c.address || '').substring(0,70)}...</td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="event.stopImmediatePropagation(); showQR('${c.id}')" class="text-yellow-400 mr-4"><i class="fa-solid fa-qrcode"></i></button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('customers-view').innerHTML = html;
        }

        // Products
        function renderProducts() {
            let html = `<h1 class="text-3xl font-semibold mb-6">Products</h1>`;
            html += `<button onclick="addProduct()" class="mb-6 px-6 py-3 bg-yellow-500 text-black rounded-3xl">+ Add Product</button>`;
            html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
            allProducts.forEach(p => {
                html += `
                    <div class="bg-zinc-900 rounded-3xl p-4">
                        <img src="${p.image}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <div class="font-medium">${p.name}</div>
                        <div class="text-yellow-400">RM ${p.price}</div>
                    </div>`;
            });
            html += `</div>`;
            document.getElementById('products-view').innerHTML = html;
        }

        function addProduct() {
            const name = prompt("Product Name:");
            if (!name) return;
            const price = parseFloat(prompt("Price (RM):")) || 0;

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async () => {
                    await db.collection('products').add({
                        name, price,
                        image: reader.result,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert("✅ Product added!");
                    loadProducts();
                };
                reader.readAsDataURL(file);
            };
            fileInput.click();
        }

        // ==================== INVOICE GENERATION ====================
        function renderInvoices() {
            let html = `<h1 class="text-3xl font-semibold mb-6">Invoice Generator</h1>`;
            html += `<button onclick="showInvoiceModal()" class="px-6 py-3 bg-yellow-500 text-black rounded-3xl">+ Create New Invoice</button>`;
            document.getElementById('invoices-view').innerHTML = html;
        }

        function showInvoiceModal() {
            invoiceItems = [];
            let html = `
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm mb-2">Customer</label>
                        <select id="invoice-customer" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                            <option value="">Select Customer</option>
                            ${allCustomers.map(c => `<option value="${c.id}">${c.company}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-2">Add Product</label>
                        <select id="invoice-product" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                            <option value="">Select Product</option>
                            ${allProducts.map(p => `<option value="${p.id}">${p.name} - RM ${p.price}</option>`).join('')}
                        </select>
                        <button onclick="addItemToInvoice()" class="mt-3 px-6 py-2 bg-zinc-700 rounded-2xl">Add Item</button>
                    </div>
                </div>

                <table class="w-full mb-6">
                    <thead><tr class="border-b"><th class="text-left py-3">Item</th><th class="text-right py-3">Price</th><th class="text-center py-3">Qty</th><th class="text-right py-3">Amount</th><th></th></tr></thead>
                    <tbody id="invoice-items"></tbody>
                </table>

                <div class="flex justify-end">
                    <div class="text-right">
                        <div>Subtotal: <span id="subtotal">RM 0.00</span></div>
                        <div class="text-xl font-bold mt-2">Total: <span id="total">RM 0.00</span></div>
                    </div>
                </div>
            `;
            document.getElementById('invoice-form').innerHTML = html;
            document.getElementById('invoice-modal').classList.remove('hidden');
            updateInvoiceTotal();
        }

        function addItemToInvoice() {
            const productId = document.getElementById('invoice-product').value;
            if (!productId) return alert("Select a product");
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            invoiceItems.push({ ...product, qty: 1 });
            renderInvoiceItems();
            updateInvoiceTotal();
        }

        function renderInvoiceItems() {
            let html = '';
            invoiceItems.forEach((item, index) => {
                html += `
                    <tr class="border-b">
                        <td class="py-3">${item.name}</td>
                        <td class="text-right py-3">RM ${item.price}</td>
                        <td class="text-center py-3">
                            <input type="number" value="${item.qty}" onchange="changeQty(${index}, this.value)" class="w-16 bg-zinc-800 text-center rounded-xl">
                        </td>
                        <td class="text-right py-3">RM ${(item.price * item.qty).toFixed(2)}</td>
                        <td><button onclick="removeItem(${index})" class="text-red-400">×</button></td>
                    </tr>`;
            });
            document.getElementById('invoice-items').innerHTML = html;
        }

        function changeQty(index, qty) {
            invoiceItems[index].qty = parseInt(qty) || 1;
            updateInvoiceTotal();
        }

        function removeItem(index) {
            invoiceItems.splice(index, 1);
            renderInvoiceItems();
            updateInvoiceTotal();
        }

        function updateInvoiceTotal() {
            let subtotal = invoiceItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('subtotal').textContent = `RM ${subtotal.toFixed(2)}`;
            document.getElementById('total').textContent = `RM ${subtotal.toFixed(2)}`;
        }

        function generateInvoicePreview() {
            const customerId = document.getElementById('invoice-customer').value;
            const customer = allCustomers.find(c => c.id === customerId);
            if (!customer) return alert("Please select a customer");

            let itemsHtml = invoiceItems.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td class="text-right">RM ${item.price}</td>
                    <td class="text-center">${item.qty}</td>
                    <td class="text-right">RM ${(item.price * item.qty).toFixed(2)}</td>
                </tr>
            `).join('');

            let subtotal = invoiceItems.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const invoiceHTML = `
                <div style="font-family: Arial; max-width: 800px; margin: 20px auto; padding: 40px; border: 1px solid #ddd;">
                    <h1 style="text-align:center; color:#eab308;">INVOICE</h1>
                    <h2 style="text-align:center;">Your Company Name</h2>
                    <p style="text-align:center;">Header Text Here</p>
                    <hr>
                    <p><strong>Bill To:</strong> ${customer.company}<br>${customer.address}</p>
                    <table style="width:100%; border-collapse:collapse; margin:20px 0;">
                        <thead><tr style="background:#333; color:white;"><th style="padding:8px; text-align:left;">Item</th><th style="padding:8px; text-align:right;">Price</th><th style="padding:8px;">Qty</th><th style="padding:8px; text-align:right;">Amount</th></tr></thead>
                        <tbody>${itemsHtml}</tbody>
                    </table>
                    <div style="text-align:right; font-size:18px;">
                        <strong>Total: RM ${subtotal.toFixed(2)}</strong>
                    </div>
                    <p style="margin-top:50px; text-align:center;">Thank you for your business!</p>
                    <p style="text-align:center;">Footer Text Here</p>
                </div>
            `;

            const win = window.open('', '_blank');
            win.document.write(invoiceHTML);
            win.document.close();
            setTimeout(() => win.print(), 500);
            hideInvoiceModal();
        }

        function hideInvoiceModal() {
            document.getElementById('invoice-modal').classList.add('hidden');
        }

        function renderReports() {
            document.getElementById('reports-view').innerHTML = `<h1 class="text-3xl font-semibold">Reports</h1><p class="mt-8 text-zinc-400">Full reports coming soon.</p>`;
        }

        function hideQRModal() {
            document.getElementById('qr-modal').classList.add('hidden');
        }

        async function showQR(id) {
            const doc = await db.collection('customers').doc(id).get();
            const c = doc.data();
            document.getElementById('qr-company').textContent = c.company;
            document.getElementById('qr-address').textContent = c.address || '';
            const container = document.getElementById('qr-code-container');
            container.innerHTML = '';
            new QRCode(container, { text: JSON.stringify({company: c.company, address: c.address}), width: 260, height: 260 });
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        function showAddCustomerModal() {
            const html = `
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="block text-xs uppercase text-zinc-400 mb-2">Company Name *</label>
                    <input id="company-name" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4"></div>
                    <div><label class="block text-xs uppercase text-zinc-400 mb-2">Address *</label>
                    <textarea id="address" rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4"></textarea></div>
                </div>`;
            document.getElementById('customer-form').innerHTML = html;
            document.getElementById('customer-modal').classList.remove('hidden');
        }

        async function saveCustomer() {
            const company = document.getElementById('company-name').value.trim();
            const address = document.getElementById('address').value.trim();
            if (!company || !address) return alert("Company and Address required");

            await db.collection('customers').add({
                company, address,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ Customer saved!");
            hideCustomerModal();
            loadCustomers();
        }

        function hideCustomerModal() {
            document.getElementById('customer-modal').classList.add('hidden');
        }

        function logout() { location.reload(); }

        window.login = login;
        window.navigateTo = navigateTo;
        window.showAddCustomerModal = showAddCustomerModal;
        window.hideCustomerModal = hideCustomerModal;
        window.saveCustomer = saveCustomer;
        window.hideQRModal = hideQRModal;
        window.addProduct = addProduct;
        window.showInvoiceModal = showInvoiceModal;
        window.hideInvoiceModal = hideInvoiceModal;
        window.addItemToInvoice = addItemToInvoice;
        window.generateInvoicePreview = generateInvoicePreview;
        window.logout = logout;

        window.onload = () => login();
    </script>
</body>
</html>
